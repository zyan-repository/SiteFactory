baseURL = "https://search123.top/"
themesDir = "../../themes"
theme = "sitefactory"
languageCode = "en"
title = "Search123"

# Performance
enableRobotsTXT = true
enableEmoji = false
enableGitInfo = false
disableHugoGeneratorInject = true

[params]
  description = "Practical guides to search smarter, work faster, and stay safe online"
  homepageTitle = "Search123 - Search Smarter, Work Faster, Stay Safe Online"
  author = "Arron Zhou"
  authorBio = "Arron Zhou is a frontend engineer with 8 years of experience building web applications. After spending years helping colleagues navigate search engines and productivity tools, he started Search123 to share practical, tested techniques with a wider audience. Every tool reviewed on this site has been personally installed, configured, and used for at least one week before publication."
  authorAvatar = "/images/author.jpg"
  authorGithub = "https://github.com/arronzhou"
  authorLinkedin = "https://linkedin.com/in/arronzhou"
  siteName = "adsense-home"
  showToolsNav = true
  showCrosslinks = true
  # AdSense (pub ID injected via HUGO_PARAMS_ADSENSEPUBID env var at build time)
  adsenseEnabled = true
  adsensePubId = ""
  # Analytics
  googleAnalyticsId = "G-5JJ2VHPXNQ"
  googleSearchConsoleVerification = ""
  # SEO (og:image auto-falls back to static/og-default.png)

  # Giscus comments (using SiteFactory repo Discussions)
  [params.giscus]
    enabled = true
    repo = "zyan-repository/SiteFactory"
    repoId = "R_kgDORSx8FQ"
    category = "General"
    categoryId = "DIC_kwDORSx8Fc4C3qJF"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "github"
    lineNos = false
    noClasses = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[taxonomies]
  tag = "tags"
  category = "categories"

[permalinks]
  posts = "/posts/:slug/"

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  minifyOutput = true
