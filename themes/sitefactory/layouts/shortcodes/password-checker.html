<div class="tool-widget password-checker" id="password-checker">
  <h3 class="tool-widget-title">Password Strength Checker</h3>
  <p class="tool-widget-desc">Check how strong your password is. Everything runs in your browser — your password never leaves your device.</p>

  <div class="pc-input-row">
    <input type="password" id="pc-input" placeholder="Type or paste a password" autocomplete="off">
    <button type="button" id="pc-toggle" class="sb-btn sb-btn-secondary" aria-label="Toggle visibility">Show</button>
  </div>

  <div class="pc-meter">
    <div class="pc-meter-bar" id="pc-bar"></div>
  </div>
  <div class="pc-label" id="pc-label">Enter a password above</div>

  <div class="pc-details" id="pc-details" style="display:none">
    <div class="pc-stat">
      <span class="pc-stat-label">Estimated crack time</span>
      <span class="pc-stat-value" id="pc-time">—</span>
    </div>
    <div class="pc-stat">
      <span class="pc-stat-label">Entropy</span>
      <span class="pc-stat-value" id="pc-entropy">—</span>
    </div>
    <div class="pc-checks" id="pc-checks"></div>
    <div class="pc-tips" id="pc-tips"></div>
  </div>
</div>

<style>
.password-checker{background:var(--surface,#f8f9fa);border:1px solid var(--border,#dee2e6);border-radius:12px;padding:1.5rem;margin:2rem 0}
.pc-input-row{display:flex;gap:.5rem}
.pc-input-row input{flex:1;padding:.6rem .75rem;border:1px solid var(--border,#dee2e6);border-radius:6px;font-size:1rem;font-family:monospace;background:#fff}
.pc-input-row input:focus{outline:none;border-color:var(--accent,#2563eb);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.pc-meter{height:6px;background:#e2e8f0;border-radius:3px;margin:1rem 0 .5rem;overflow:hidden}
.pc-meter-bar{height:100%;width:0;border-radius:3px;transition:width .3s,background .3s}
.pc-label{font-weight:600;font-size:.95rem;margin-bottom:1rem}
.pc-details{border-top:1px solid var(--border,#dee2e6);padding-top:1rem}
.pc-stat{display:flex;justify-content:space-between;padding:.35rem 0;font-size:.9rem}
.pc-stat-label{color:var(--muted,#6c757d)}
.pc-stat-value{font-weight:600;font-family:monospace}
.pc-checks{margin-top:.75rem;display:grid;grid-template-columns:1fr 1fr;gap:.25rem .75rem}
.pc-check{font-size:.85rem;display:flex;align-items:center;gap:.35rem}
.pc-check-pass{color:#16a34a}
.pc-check-fail{color:#dc2626}
.pc-tips{margin-top:.75rem;padding:.75rem;background:rgba(37,99,235,.06);border-radius:6px;font-size:.85rem;color:var(--text,#1e293b)}
.pc-tips strong{display:block;margin-bottom:.25rem}
@media(max-width:600px){.pc-checks{grid-template-columns:1fr}}
</style>

<script>
(function(){
  var levels = [
    {label:'Very Weak',color:'#dc2626',pct:10},
    {label:'Weak',color:'#ea580c',pct:30},
    {label:'Fair',color:'#ca8a04',pct:50},
    {label:'Strong',color:'#16a34a',pct:75},
    {label:'Very Strong',color:'#059669',pct:100}
  ];

  function calcEntropy(pw){
    var pool = 0;
    if(/[a-z]/.test(pw)) pool += 26;
    if(/[A-Z]/.test(pw)) pool += 26;
    if(/[0-9]/.test(pw)) pool += 10;
    if(/[^a-zA-Z0-9]/.test(pw)) pool += 33;
    return pool > 0 ? Math.floor(pw.length * Math.log2(pool)) : 0;
  }

  function crackTime(entropy){
    var guesses = Math.pow(2, entropy);
    var rate = 1e10; // 10 billion guesses/sec (modern GPU cluster)
    var secs = guesses / rate;
    if(secs < 1) return 'Instant';
    if(secs < 60) return Math.round(secs) + ' seconds';
    if(secs < 3600) return Math.round(secs/60) + ' minutes';
    if(secs < 86400) return Math.round(secs/3600) + ' hours';
    if(secs < 31536000) return Math.round(secs/86400) + ' days';
    var years = secs / 31536000;
    if(years < 1000) return Math.round(years) + ' years';
    if(years < 1e6) return Math.round(years/1000) + 'K years';
    if(years < 1e9) return Math.round(years/1e6) + 'M years';
    return Math.round(years/1e9) + 'B years';
  }

  function getLevel(entropy){
    if(entropy < 28) return 0;
    if(entropy < 40) return 1;
    if(entropy < 56) return 2;
    if(entropy < 72) return 3;
    return 4;
  }

  function analyze(pw){
    var bar = document.getElementById('pc-bar');
    var label = document.getElementById('pc-label');
    var details = document.getElementById('pc-details');

    if(!pw){
      bar.style.width = '0';
      label.textContent = 'Enter a password above';
      label.style.color = '';
      details.style.display = 'none';
      return;
    }

    var entropy = calcEntropy(pw);
    var lvl = getLevel(entropy);
    var info = levels[lvl];

    bar.style.width = info.pct + '%';
    bar.style.background = info.color;
    label.textContent = info.label;
    label.style.color = info.color;

    document.getElementById('pc-time').textContent = crackTime(entropy);
    document.getElementById('pc-entropy').textContent = entropy + ' bits';

    var checks = [
      {test: pw.length >= 8, pass: 'Length 8+', fail: 'Too short (< 8)'},
      {test: pw.length >= 12, pass: 'Length 12+', fail: 'Could be longer'},
      {test: /[a-z]/.test(pw), pass: 'Lowercase', fail: 'No lowercase'},
      {test: /[A-Z]/.test(pw), pass: 'Uppercase', fail: 'No uppercase'},
      {test: /[0-9]/.test(pw), pass: 'Numbers', fail: 'No numbers'},
      {test: /[^a-zA-Z0-9]/.test(pw), pass: 'Symbols', fail: 'No symbols'}
    ];

    var checksHtml = '';
    checks.forEach(function(c){
      var cls = c.test ? 'pc-check-pass' : 'pc-check-fail';
      var icon = c.test ? '&#10003;' : '&#10007;';
      var text = c.test ? c.pass : c.fail;
      checksHtml += '<div class="pc-check '+cls+'"><span>'+icon+'</span> '+text+'</div>';
    });
    document.getElementById('pc-checks').innerHTML = checksHtml;

    var tips = [];
    if(pw.length < 12) tips.push('Use at least 12 characters for better security.');
    if(!/[^a-zA-Z0-9]/.test(pw)) tips.push('Add symbols like @, #, $, or % to increase complexity.');
    if(/^[a-zA-Z]+$/.test(pw)) tips.push('Mix in numbers and symbols — dictionary words are easy to crack.');
    if(/(.)\1{2,}/.test(pw)) tips.push('Avoid repeating characters (e.g., "aaa" or "111").');
    if(/^(123|abc|qwerty|password|letmein)/i.test(pw)) tips.push('This looks like a common password pattern. Try something more unique.');
    if(tips.length === 0 && lvl >= 3) tips.push('Great password! Consider using a password manager to store it safely.');

    var tipsEl = document.getElementById('pc-tips');
    if(tips.length){
      tipsEl.innerHTML = '<strong>Tips</strong>' + tips.join('<br>');
      tipsEl.style.display = '';
    } else {
      tipsEl.style.display = 'none';
    }

    details.style.display = '';
  }

  document.getElementById('pc-input').addEventListener('input', function(){
    analyze(this.value);
  });

  document.getElementById('pc-toggle').addEventListener('click', function(){
    var inp = document.getElementById('pc-input');
    if(inp.type === 'password'){
      inp.type = 'text';
      this.textContent = 'Hide';
    } else {
      inp.type = 'password';
      this.textContent = 'Show';
    }
  });
})();
</script>
