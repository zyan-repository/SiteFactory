name: Site Health Check

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all sites
        env:
          SF_DOMAIN: ${{ secrets.SF_DOMAIN }}
        run: |
          FAILED=0
          TOTAL=0

          echo "## Site Health Report" >> "$GITHUB_STEP_SUMMARY"
          echo "| Site | URL | Status | Code |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|--------|------|" >> "$GITHUB_STEP_SUMMARY"

          # Curl with retry: tries up to 3 times with 5s between attempts
          check_url() {
            local url="$1"
            local attempt
            for attempt in 1 2 3; do
              local code
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" 2>/dev/null || echo "000")
              if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
                echo "$code"
                return 0
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "  Retry $attempt for $url (got $code)" >&2
                sleep 5
              fi
            done
            echo "$code"
            return 1
          }

          for site_dir in sites/*/; do
            name=$(basename "$site_dir")
            [[ "$name" == "_template" ]] && continue
            [[ "$name" == "_shared" ]] && continue
            [[ ! -f "$site_dir/site.yaml" ]] && continue

            TOTAL=$((TOTAL + 1))
            URL="https://${name}.${SF_DOMAIN}"
            HTTP_CODE=$(check_url "$URL")

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "OK   ($HTTP_CODE): $URL"
              echo "| $name | $URL | OK | $HTTP_CODE |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "FAIL ($HTTP_CODE): $URL"
              echo "| $name | $URL | **FAIL** | $HTTP_CODE |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $((TOTAL - FAILED))/$TOTAL healthy**" >> "$GITHUB_STEP_SUMMARY"

          # Check root domain if root-domain.yaml exists
          if [ -f "root-domain.yaml" ]; then
            ROOT_SITE=$(grep "^current_site:" root-domain.yaml | awk '{print $2}')
            if [ -n "$ROOT_SITE" ]; then
              TOTAL=$((TOTAL + 1))
              ROOT_URL="https://${SF_DOMAIN}"
              HTTP_CODE=$(check_url "$ROOT_URL")
              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
                echo "OK   ($HTTP_CODE): $ROOT_URL (root -> $ROOT_SITE)"
                echo "| ${ROOT_SITE} (root) | $ROOT_URL | OK | $HTTP_CODE |" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "FAIL ($HTTP_CODE): $ROOT_URL (root -> $ROOT_SITE)"
                echo "| ${ROOT_SITE} (root) | $ROOT_URL | **FAIL** | $HTTP_CODE |" >> "$GITHUB_STEP_SUMMARY"
                FAILED=$((FAILED + 1))
              fi
            fi
          fi

          echo ""
          echo "Results: $((TOTAL - FAILED))/$TOTAL healthy"

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED site(s) are unhealthy"
            exit 1
          fi
